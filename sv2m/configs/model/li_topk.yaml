defaults:
  - baseline
  - _self_

loss_fn:
  _target_: sv2m.criterion.CrossModalInfoNCELoss
  temperature: 0.09
  min_temperature: 0.07
  video_aggregators:
    - _target_: sv2m.modules.aggregater.LateInteractionAggregator
      aggregation: "top_k"
      top_k: 4
      use_span_mask: false
  music_aggregators:
    - _target_: sv2m.modules.aggregater.LateInteractionAggregator
      aggregation: "top_k"
      top_k: 4
      use_span_mask: false